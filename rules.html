<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- My Style CSS-->
     <link rel="stylesheet" href="css/style.css">
    <title>Quiz Rules</title>
</head>
<body>
    <div class="container">
        <div class="rules-box">
            <h2>Quiz Rules</h2>
            <div class="rules-list">
                <p>1. Anda hanya memiliki waktu <b>15 detik</b> untuk setiap soal.</p>
                <p>2. Setelah memilih jawaban, Anda tidak dapat mengubahnya.</p>
                <p>3. Tidak dapat kembali ke soal sebelumnya.</p>
                <p>4. Setiap jawaban benar mendapat <b>20 poin</b>.</p>
                <p>5. Setelah waktu habis, soal berikutnya akan tampil otomatis.</p>
            </div>
            <div class="buttons">
                <button id="exitBtn">
                    Keluar Quiz
                </button>
                <button id="startBtn">
                    Mulai Quiz
                </button>
            </div>
        </div>
    </div>
    <script src="js/rules.js"></script>
</body>
</html>
